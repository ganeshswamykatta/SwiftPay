server:
  port: 8080

spring:
  application:
    name: transaction-gateway

  datasource:
    url: jdbc:postgresql://localhost:5432/swiftpay
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: update
    show-sql: true

  kafka:
    bootstrap-servers: localhost:9092
    topic: payment-events

  data:
    redis:
      host: localhost
      port: 6379